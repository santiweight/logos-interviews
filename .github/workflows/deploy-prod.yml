name: Deploy prod

on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-prod:
    name: Deploy prod
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Validate production ref
        run: |
          test "$GITHUB_REF_NAME" = "main" || { echo "Production deploys must run from main"; exit 1; }
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1
      - name: Validate prod deployment configuration
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
        run: |
          test -n "$FLY_API_TOKEN" || { echo "Missing FLY_API_TOKEN repository or environment secret"; exit 1; }
          test -n "$FLY_APP_NAME" || { echo "Missing FLY_APP_NAME prod environment variable"; exit 1; }
      - name: Deploy prod to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
        run: flyctl deploy --remote-only --ha=false --app "$FLY_APP_NAME"
