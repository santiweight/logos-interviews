name: Deploy prod

on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-dev-image:
    name: Resolve dev image
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image-ref: ${{ steps.image.outputs.image-ref }}
    steps:
      - name: Validate production ref
        run: |
          test "$GITHUB_REF_NAME" = "main" || { echo "Production deploys must run from main"; exit 1; }
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1
      - name: Resolve current dev image
        id: image
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
        run: |
          test -n "$FLY_API_TOKEN" || { echo "Missing FLY_API_TOKEN repository or environment secret"; exit 1; }
          test -n "$FLY_APP_NAME" || { echo "Missing FLY_APP_NAME dev environment variable"; exit 1; }
          image_json="$(flyctl image show --app "$FLY_APP_NAME" --json)"
          image_ref="$(FLY_IMAGE_JSON="$image_json" pnpm exec tsx scripts/fly-dev-image-ref.ts)"
          echo "Promoting image: $image_ref"
          echo "image-ref=$image_ref" >> "$GITHUB_OUTPUT"

  deploy-prod:
    name: Promote dev image to prod
    needs: resolve-dev-image
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Validate production ref
        run: |
          test "$GITHUB_REF_NAME" = "main" || { echo "Production deploys must run from main"; exit 1; }
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1
      - name: Validate prod deployment configuration
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
        run: |
          test -n "$FLY_API_TOKEN" || { echo "Missing FLY_API_TOKEN repository or environment secret"; exit 1; }
          test -n "$FLY_APP_NAME" || { echo "Missing FLY_APP_NAME prod environment variable"; exit 1; }
          test -n "${{ needs.resolve-dev-image.outputs.image-ref }}" || { echo "Missing dev image ref"; exit 1; }
      - name: Promote dev image to prod on Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
          IMAGE_REF: ${{ needs.resolve-dev-image.outputs.image-ref }}
        run: flyctl deploy --ha=false --app "$FLY_APP_NAME" --image "$IMAGE_REF"

  smoke-prod:
    name: Smoke prod
    needs: deploy-prod
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install browser dependencies
        run: pnpm exec playwright install --with-deps chromium
      - name: Smoke prod deployment
        env:
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
        run: pnpm smoke:deployment -- --base-url "https://${FLY_APP_NAME}.fly.dev"
