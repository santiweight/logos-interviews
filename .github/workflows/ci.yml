name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LOGOS_ANTHROPIC_API_KEY: ${{ secrets.LOGOS_ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  unit-tests:
    runs-on: ubuntu-latest
    env:
      LOGOS_ANTHROPIC_API_KEY: ${{ secrets.LOGOS_ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm test

  e2e-tests:
    runs-on: ubuntu-latest
    env:
      LOGOS_ANTHROPIC_API_KEY: ${{ secrets.LOGOS_ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install browser dependencies
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E tests
        run: pnpm test:e2e

  production-smoke:
    runs-on: ubuntu-latest
    env:
      LOGOS_ANTHROPIC_API_KEY: ${{ secrets.LOGOS_ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: logos-interviews-smoke
          secrets: |
            LOGOS_ANTHROPIC_API_KEY=${{ secrets.LOGOS_ANTHROPIC_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Production image smoke test
        run: ./scripts/smoke-production-image.sh logos-interviews-smoke
