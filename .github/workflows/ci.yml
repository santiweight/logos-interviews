name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install browser dependencies
        run: pnpm exec playwright install --with-deps chromium
      - name: Build
        run: pnpm build
      - name: Unit tests
        run: pnpm test
      - name: E2E tests
        run: pnpm test:e2e
