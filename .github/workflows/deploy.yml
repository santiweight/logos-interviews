name: Deploy dev

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-dev:
    name: Deploy dev
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1
      - name: Validate dev deployment configuration
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
        run: |
          test -n "$FLY_API_TOKEN" || { echo "Missing FLY_API_TOKEN repository or environment secret"; exit 1; }
          test -n "$FLY_APP_NAME" || { echo "Missing FLY_APP_NAME dev environment variable"; exit 1; }
          flyctl secrets list --json --app "$FLY_APP_NAME" \
            | node -e 'const secrets = JSON.parse(require("node:fs").readFileSync(0, "utf8")); const names = new Set(secrets.map((secret) => secret.Name ?? secret.name)); const required = ["LOGOS_ANTHROPIC_API_KEY", "BUCKET_NAME", "AWS_ACCESS_KEY_ID", "AWS_SECRET_ACCESS_KEY", "AWS_ENDPOINT_URL_S3", "AWS_REGION"]; const missing = required.filter((name) => !names.has(name)); if (missing.length > 0) { console.error(`Missing Fly secrets on dev app: ${missing.join(", ")}`); process.exit(1); }'
      - name: Deploy dev to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
          LOGOS_ANTHROPIC_API_KEY: ${{ secrets.LOGOS_ANTHROPIC_API_KEY }}
        run: |
          test -n "$LOGOS_ANTHROPIC_API_KEY" || { echo "Missing LOGOS_ANTHROPIC_API_KEY dev environment secret"; exit 1; }
          flyctl deploy --remote-only --ha=false --app "$FLY_APP_NAME" \
            --build-secret "LOGOS_ANTHROPIC_API_KEY=$LOGOS_ANTHROPIC_API_KEY"

  smoke-dev:
    name: Smoke dev
    needs: deploy-dev
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install browser dependencies
        run: pnpm exec playwright install --with-deps chromium
      - name: Smoke dev deployment
        env:
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
          # Automated Anthropic evals are disabled for now to avoid API spend.
          # SMOKE_ANTHROPIC_E2E: "true"
        run: pnpm smoke:deployment -- --base-url "https://${FLY_APP_NAME}.fly.dev"
      - name: Smoke dev browser e2e
        env:
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
          RUN_ANTHROPIC_E2E: "true"
          LOGOS_E2E_BASE_URL: https://${{ vars.FLY_APP_NAME }}.fly.dev
        run: pnpm exec vitest run --config vitest.e2e.config.ts src/tests/e2e/liveUiTypeScriptProgram.browser.e2e.ts
