name: Deploy dev

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-dev:
    name: Deploy dev
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1
      - name: Validate dev deployment configuration
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
        run: |
          test -n "$FLY_API_TOKEN" || { echo "Missing FLY_API_TOKEN repository or environment secret"; exit 1; }
          test -n "$FLY_APP_NAME" || { echo "Missing FLY_APP_NAME dev environment variable"; exit 1; }
          flyctl secrets list --json --app "$FLY_APP_NAME" \
            | node -e 'const secrets = JSON.parse(require("node:fs").readFileSync(0, "utf8")); const names = new Set(secrets.map((secret) => secret.Name ?? secret.name)); const required = ["ANTHROPIC_API_KEY", "BUCKET_NAME", "AWS_ACCESS_KEY_ID", "AWS_SECRET_ACCESS_KEY", "AWS_ENDPOINT_URL_S3", "AWS_REGION"]; const missing = required.filter((name) => !names.has(name)); if (missing.length > 0) { console.error(`Missing Fly secrets on dev app: ${missing.join(", ")}`); process.exit(1); }'
      - name: Deploy dev to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
        run: flyctl deploy --remote-only --ha=false --app "$FLY_APP_NAME"

  smoke-dev:
    name: Smoke dev
    needs: deploy-dev
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Smoke dev deployment
        env:
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
          # Automated Anthropic evals are disabled for now to avoid API spend.
          # SMOKE_ANTHROPIC_E2E: "true"
        run: ./scripts/smoke-deployment.sh "https://${FLY_APP_NAME}.fly.dev"
